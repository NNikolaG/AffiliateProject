<div class="background">
    <div class="container">
        <h1>Today's top deals</h1>
        <div class="row">
            <div class="top-deal col-lg-7 col-12">
                <div class="row">
                    <div class="image col-6">
                        <img src="../../../../assets/images/{{products[0].image}}" alt="">
                    </div>
                    <div class="desc col-6">
                        <p>{{products[0].category}}</p>
                        <h3>{{products[0].title}}</h3>
                        <button class="basic-btn">see more</button>
                    </div>
                </div>
            </div>
            <div class="cards col-lg-5 col-12">
                <div class="col-12" *ngFor="let product of products; let indexer = index">
                    <div class="single-top col-12" *ngIf="indexer != 0">
                        <div class="row">
                            <div class="image col-4">
                                <img src="../../../../assets/images/{{product.image}}" alt="">
                            </div>
                            <div class="desc col-6">
                                <p>{{product.category}}</p>
                                <h3>{{product.title}}</h3>
                                <button class="basic-btn">see more</button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
