<div class="background">
    <div class="container">
        <h1>Today's top deals</h1>
        <div class="row">
            <div class="top-deal col-md-7 col-11">
                <div class="row">
                    <div class="image col-6">
                        <img src="../../../../assets/images/{{products[0].image}}" alt="">
                    </div>
                    <div class="desc col-6">
                        <p>{{products[0].category}}</p>
                        <h3>{{products[0].title}}</h3>
                        <button class="basic-btn">see more</button>
                    </div>
                </div>
            </div>
            <div class="cards col-md-5 col-12">
                <div *ngFor="let product of products; let indexer = index">
                    <div class="single-top" *ngIf="indexer != 0">
                        <div class="row">
                            <div class="image col-4">
                                <img src="../../../../assets/images/{{product.image}}" alt="">
                            </div>
                            <div class="desc col-6">
                                <p>{{product.category}}</p>
                                <h3>{{product.title}}</h3>
                                <button class="basic-btn">see more</button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
