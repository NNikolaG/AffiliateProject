<div class="row">
    <div class="col-12 navigation-top pt-3">
        <div class="container d-flex">
            <div class="col-md-4 col-12 logo d-flex ">
                <h1>OFFICE</h1>
            </div>
            <div class="col-4 search d-flex justify-content-center">
                <input type="search" placeholder="Search for products">
                <div class="search-icon round d-flex justify-content-center align-items-center">
                    <fa-icon [icon]="faSearch"></fa-icon>
                </div>
            </div>
            <div class="col-4 log-in d-flex justify-content-end">
                <div class="row">
                    <div ngbDropdown class="d-inline-block">
                        <button type="text" class="menu d-flex justify-content-around align-items-center"
                            (click)="display = true">
                            <fa-icon [icon]="faMenu"></fa-icon>
                            <div class="round d-flex justify-content-center align-items-center">
                                <fa-icon [icon]="faUser"></fa-icon>
                            </div>
                        </button>
                    </div>
                </div>
            </div>

        </div>
    </div>
</div>
<div class="row">
    <div class="col-12 navigation-bot pt-2 pb-3">
        <div class="container d-flex justify-content-around">
            <div class="col-4 search d-flex justify-content-center">
                <div class="row">
                    <div ngbDropdown class="d-inline-block">
                        <button type="text" class="menu d-flex justify-content-around align-items-center">
                            <div class="round d-flex justify-content-center align-items-center">
                                <lord-icon src="https://cdn.lordicon.com/pvbutfdk.json" trigger="loop"
                                    colors="primary:#ffffff" style="width:20px;height:20px;">
                                </lord-icon>
                            </div>
                        </button>
                    </div>
                </div>
            </div>
            <div class="col-4 log-in d-flex justify-content-end">
                <div class="row">
                    <div ngbDropdown class="d-inline-block">
                        <button type="text" class="menu d-flex justify-content-around align-items-center"
                            (click)="display = true">
                            <div class="d-flex justify-content-center align-items-center">
                                <lord-icon src="https://cdn.lordicon.com/elkhjhci.json" trigger="loop"
                                    colors="primary:#121331" style="width:30px;height:30px">
                                </lord-icon>
                            </div>
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
<p-sidebar [(visible)]="display" position="right" [autoZIndex]="false">
    <div class="user-info d-flex justify-content-around align-items-center">
        <p-avatar image="../../../../assets/images/download.jpg" styleClass="mr-2" size="xlarge"
            shape="circle"></p-avatar>
        <div class="username col-7">
            <h4>NIKOLAGUTIC</h4>
        </div>
    </div>
    <div class="nav-list">
        <ul>
            <li>Log in</li>
            <li>Sign up</li>
            <hr>
            <li>Something Else</li>
        </ul>
    </div>
</p-sidebar>
